<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PT Academy — Assessment Eligibility Report</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --black: #000000;
      --white: #ffffff;
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --surface: #111111;
      --border: #222222;
      --text-muted: #aaaaaa;
    }

    body {
      background-color: var(--black);
      color: var(--white);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen,
        Ubuntu, Cantarell, sans-serif;
      line-height: 1.6;
      padding: 0;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    /* Header */
    .header {
      border-bottom: 3px solid var(--gold);
      padding-bottom: 1.5rem;
      margin-bottom: 2rem;
    }

    .header h1 {
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .header p {
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    /* Controls */
    .controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
    }

    .tab {
      padding: 0.75rem 1.5rem;
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1rem;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.2s ease;
    }

    .tab:hover {
      color: var(--white);
    }

    .tab.active {
      color: var(--white);
      border-bottom-color: var(--gold);
    }

    .refresh-btn {
      padding: 0.75rem 1.5rem;
      background-color: var(--gold);
      color: var(--black);
      border: none;
      border-radius: 4px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .refresh-btn:hover:not(:disabled) {
      background-color: var(--gold-light);
      transform: scale(1.02);
    }

    .refresh-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .refresh-icon {
      display: inline-block;
      transition: transform 0.6s ease;
    }

    .refresh-btn:disabled .refresh-icon {
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }

    /* Status Section */
    .status {
      margin-bottom: 2rem;
      padding: 1rem;
      background-color: var(--surface);
      border-left: 3px solid var(--gold);
      border-radius: 4px;
    }

    .status-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .status-count {
      font-size: 1.2rem;
      font-weight: 600;
    }

    .status-count strong {
      color: var(--gold);
    }

    .status-time {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    /* Loading Spinner */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid var(--gold);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 0.5rem;
      vertical-align: middle;
    }

    /* Message States */
    .message {
      padding: 1.5rem;
      border-radius: 4px;
      text-align: center;
      margin: 2rem 0;
    }

    .message.loading {
      background-color: var(--surface);
      color: var(--white);
    }

    .message.error {
      background-color: #2a1818;
      color: #ffcccc;
      border: 1px solid #663333;
    }

    .message.empty {
      background-color: var(--surface);
      color: var(--text-muted);
    }

    /* Table */
    .table-wrapper {
      overflow-x: auto;
      margin-top: 1.5rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background-color: var(--surface);
      border-radius: 4px;
      overflow: hidden;
    }

    thead {
      background-color: #1a1a1a;
      border-bottom: 2px solid var(--gold);
    }

    th {
      padding: 1rem;
      text-align: left;
      font-weight: 600;
      color: var(--gold);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }

    th:hover {
      background-color: #222222;
    }

    th.sortable::after {
      content: " ↕";
      opacity: 0.5;
      font-size: 0.8rem;
    }

    th.sortable.asc::after {
      content: " ↑";
      opacity: 1;
    }

    th.sortable.desc::after {
      content: " ↓";
      opacity: 1;
    }

    td {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
    }

    tbody tr:hover {
      background-color: #1a1a1a;
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .container {
        padding: 1rem;
      }

      .header h1 {
        font-size: 1.5rem;
      }

      .controls {
        flex-direction: column;
        align-items: stretch;
      }

      .tabs {
        width: 100%;
      }

      .tab {
        flex: 1;
        text-align: center;
      }

      .refresh-btn {
        width: 100%;
        justify-content: center;
      }

      table {
        font-size: 0.9rem;
      }

      th,
      td {
        padding: 0.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>PT Academy</h1>
      <p>Assessment Eligibility Report</p>
    </div>

    <div class="controls">
      <div class="tabs">
        <button class="tab active" data-level="Level 2">Level 2</button>
        <button class="tab" data-level="Level 3">Level 3</button>
      </div>
      <button class="refresh-btn" id="refreshBtn">
        <span class="refresh-icon">↻</span>
        <span>Refresh</span>
      </button>
    </div>

    <div id="statusArea"></div>
    <div id="contentArea"></div>
  </div>

  <script>
    // Configuration
    const PATHS = {
      "Level 2": "68c3d8c1ab3b1275d77f98a9",
      "Level 3": "683870d4260fd5d3514fd2dc",
    };

    // State
    let currentLevel = "Level 2";
    let currentData = null;
    let isLoading = false;
    let sortConfig = { column: "name", direction: "asc" };

    // DOM Elements
    const tabs = document.querySelectorAll(".tab");
    const refreshBtn = document.getElementById("refreshBtn");
    const statusArea = document.getElementById("statusArea");
    const contentArea = document.getElementById("contentArea");

    // Event Listeners
    tabs.forEach((tab) => {
      tab.addEventListener("click", (e) => {
        const newLevel = e.target.dataset.level;
        if (newLevel !== currentLevel) {
          currentLevel = newLevel;
          updateActiveTab();
          sortConfig = { column: "name", direction: "asc" };
          fetchData();
        }
      });
    });

    refreshBtn.addEventListener("click", fetchData);

    // Functions
    function updateActiveTab() {
      tabs.forEach((tab) => {
        tab.classList.toggle("active", tab.dataset.level === currentLevel);
      });
    }

    async function fetchData() {
      if (isLoading) return;

      isLoading = true;
      refreshBtn.disabled = true;

      try {
        statusArea.innerHTML =
          '<div class="message loading"><span class="spinner"></span>Loading...</div>';
        contentArea.innerHTML = "";

        const pathId = PATHS[currentLevel];
        const response = await fetch(`/api/path-stats?pathId=${pathId}`);

        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.detail || error.error || "Failed to fetch data");
        }

        currentData = await response.json();
        renderContent();
      } catch (error) {
        statusArea.innerHTML = `
          <div class="message error">
            <strong>Error loading data:</strong> ${error.message}
          </div>
        `;
        contentArea.innerHTML = "";
      } finally {
        isLoading = false;
        refreshBtn.disabled = false;
      }
    }

    function renderContent() {
      if (!currentData || currentData.total === 0) {
        statusArea.innerHTML =
          '<div class="message empty">No completed learners found for this path.</div>';
        contentArea.innerHTML = "";
        return;
      }

      // Status area
      const lastUpdated = new Date(currentData.fetchedAt).toLocaleString(
        "en-GB",
        {
          day: "numeric",
          month: "short",
          year: "numeric",
          hour: "2-digit",
          minute: "2-digit",
        }
      );

      statusArea.innerHTML = `
        <div class="status">
          <div class="status-content">
            <div class="status-count">
              <strong>${currentData.total}</strong> learners eligible
            </div>
            <div class="status-time">Last updated: ${lastUpdated}</div>
          </div>
        </div>
      `;

      // Determine if we should show scores
      const showScores = currentData.hasScores === true;

      // Prepare table headers
      let headers = `
        <th class="sortable asc" data-column="name">Name</th>
        <th>Email</th>
        <th class="sortable" data-column="completedAt">Completed</th>
      `;
      if (showScores) {
        headers += `<th class="sortable" data-column="score">Score</th>`;
      }

      // Sort data
      const sorted = sortData(currentData.learners);

      // Build table rows
      const rows = sorted
        .map((learner) => {
          const completedDate = learner.completedAt
            ? new Date(learner.completedAt).toLocaleDateString("en-GB", {
                day: "numeric",
                month: "short",
                year: "numeric",
              })
            : "—";

          let row = `
            <tr>
              <td>${escapeHtml(learner.name)}</td>
              <td>${escapeHtml(learner.email)}</td>
              <td>${completedDate}</td>
          `;
          if (showScores) {
            row += `<td>${learner.score !== null ? learner.score + "%" : "—"}</td>`;
          }
          row += `</tr>`;
          return row;
        })
        .join("");

      contentArea.innerHTML = `
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>${headers}</tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      `;

      // Attach sort listeners
      document.querySelectorAll("th.sortable").forEach((th) => {
        th.addEventListener("click", (e) => {
          const column = e.target.dataset.column;
          if (sortConfig.column === column) {
            sortConfig.direction =
              sortConfig.direction === "asc" ? "desc" : "asc";
          } else {
            sortConfig.column = column;
            sortConfig.direction = "asc";
          }
          renderContent();
        });
      });
    }

    function sortData(data) {
      const sorted = [...data];
      sorted.sort((a, b) => {
        let aVal = a[sortConfig.column];
        let bVal = b[sortConfig.column];

        // Handle null/undefined
        if (aVal === null || aVal === undefined) aVal = "";
        if (bVal === null || bVal === undefined) bVal = "";

        // Handle dates
        if (sortConfig.column === "completedAt") {
          aVal = new Date(aVal).getTime();
          bVal = new Date(bVal).getTime();
        }

        // Handle numbers
        if (sortConfig.column === "score") {
          aVal = parseFloat(aVal) || 0;
          bVal = parseFloat(bVal) || 0;
        }

        // Compare
        if (aVal < bVal) return sortConfig.direction === "asc" ? -1 : 1;
        if (aVal > bVal) return sortConfig.direction === "asc" ? 1 : -1;
        return 0;
      });

      return sorted;
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    // Initial load
    fetchData();
  </script>
</body>
</html>
